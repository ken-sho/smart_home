global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'smartctl'
    static_configs:
      - targets: ['smartctl-exporter:9633']

  - job_name: 'homeassistant'
    static_configs:
      - targets: ["192.168.10.254:8123"]
