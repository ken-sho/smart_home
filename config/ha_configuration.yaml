
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

prometheus:
  namespace: hass

homeassistant:
  external_url: "https://core.tail751bc9.ts.net"
  internal_url: "http://192.168.10.254:8123"

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
    - 100.0.0.0/8
    - 0.0.0.0/0

recorder:
  db_url: postgresql://homeassistant:homeassistant%40unix.ru@localhost:5432/homeassistant
